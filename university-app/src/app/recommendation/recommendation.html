<section class="recommendation">
  <h2>University recommendation</h2>

  <form class="form" (ngSubmit)="submit()">
    <label>
      Age
      <input name="age" [(ngModel)]="student.age" placeholder="e.g. 20" />
    </label>
    <label>
      Country
      <input
        name="country"
        [(ngModel)]="student.country"
        placeholder="e.g. Tunisia"
        required
      />
    </label>
    <label>
      Major
      <input name="major" [(ngModel)]="student.major" placeholder="e.g. Computer Science" />
    </label>
    <label>
      Language
      <input name="language" [(ngModel)]="student.language" placeholder="e.g. English" />
    </label>
    <label>
      Skills
      <input name="skills" [(ngModel)]="student.skills" placeholder="e.g. python, data" />
    </label>
    <label>
      Moyenne (GPA scale)
      <input name="moyenne" [(ngModel)]="student.moyenne" placeholder="e.g. 14" />
    </label>

    <button type="submit" [disabled]="loading">
      {{ loading ? 'Loading…' : 'Get recommendations' }}
    </button>
  </form>

  @if (error) {
    <p class="error" role="alert">{{ error }}</p>
  }

  <hr />

  <ul class="results">
    @for (uni of results; track uni.name) {
      <li>
        <h3>{{ uni.name }}</h3>
        <p>Country: {{ uni.country }}</p>
        <p>Score: {{ uni.score }}</p>
      </li>
    }
  </ul>
</section>
